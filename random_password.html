<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Rastgele Şifre</title>
</head>
<body>
<h1>Rastgele Güçlü Şifre Oluşturucu</h1>
<p id="password"></p>
<button onclick="generatePassword()">Şifre Oluştur</button>
<a href="../index.html">Geri</a>

<script>
function generatePassword(){
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
    let pass = "";
    for(let i=0;i<12;i++){
        pass += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    document.getElementById('password').innerText = pass;
}
</script>
</body>
</html>
